<html lang="zxx" dir="ltr">

<head>
   <meta charset="utf-8" />
   <title>Login</title>
   <meta content="width=device-width, initial-scale=1.0" name="viewport" />
   <!--Template style -->
   <link rel="stylesheet" type="text/css" href="static/css/animate.css" />
   <link rel="stylesheet" type="text/css" href="static/css/animate.min.css" />
   <link rel="stylesheet" type="text/css" href="static/css/bootstrap.min.css" />
   <link rel="stylesheet" type="text/css" href="static/css/fonts.css" />
   <link rel="stylesheet" type="text/css" href="static/css/font-awesome.css" />
   <link rel="stylesheet" type="text/css" href="static/css/font-awesome.min.css" />
   <link rel="stylesheet" type="text/css" href="static/css/magnific-popup.css" />
   <link rel="stylesheet" type="text/css" href="static/css/owl.carousel.min.css" />
   <link rel="stylesheet" type="text/css" href="static/css/owl.theme.default.min.css" />
   <link rel="stylesheet" type="text/css" href="static/css/style.css" />
   <link rel="stylesheet" type="text/css" href="static/css/responsive.css" />
   <!--favicon-->
   <link rel="shortcut icon" type="image/png" href="images/fav-icon.png" />
</head>

<body>
   <div class="login-main-wrapper">
      <div class="container-fluid">
         <div class="row align-items-center">
            <div class="col-lg-6 col-md-12 col-12 p-0">
               <div class="form-sidebar">
                  <div class="logo-section">
                     <img src="static/images/whitelogo.png" alt="img">
                  </div>
                  <div class="form-image d-xl-block d-lg-block d-none">
                     <img src="static/images/form-img.png" alt="img">
                  </div>
               </div>
            </div>
            <div class="col-lg-6 col-md-12 col-12 p-0">
               <div class="login-main">
                  <form action="/signin" method="GET">
                     <h4>Welcome Back</h4>
                     <p class="mb-3">Login by entering the information below</p>
                     <div class="mt-2">
                        <input type="text" class="my-width" placeholder="UserName*" name="user">
                     </div>
                     <div class="mt-2">
                        <input type="password" class="my-width" placeholder="Password*" name="password" >
                     </div>
                     
                     <div class="d-flex align-items-baseline ">
                        <button type="submit"  class="button-btn mt-4 text-capitalize">Login
                           <span><i class="fas fa-angle-double-right"></i></span>
                        </button>
                        <a href="/logon" class="ms-4 form-resp-display">Create Account</a>
                     </div>
                     <p class="mt-3"> Or you can join with</p>
                     <ul class="form-media">
                        <li><a href="javascript:;">
                           <i class="fab fa-facebook"></i>
                           </a>
                        </li>
                        <li><a href="javascript:;">
                           <i class="fab fa-twitter"></i>
                           </a>
                        </li>
                        <li><a href="javascript:;">
                           <i class="fab fa-google"></i>
                           </a>
                        </li>
                     </ul>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
   <!-- Side Panel -->
   <script src="static/js/jquery-3.6.0.min.js"></script>
   <script src="static/js/bootstrap.min.js"></script>
   <script src="static/js/wow.js"></script>
   <script src="static/js/jquery.magnific-popup.js"></script>
   <script src="static/js/owl.carousel.min.js"></script>
   <script src="static/js/contact_form.js"></script>
   <script src="static/js/custom.js"></script>
   <!-- custom js-->
   <script>
      wow = new WOW(
         {
            animateClass: 'animated',
            offset: 100,
            callback: function (box) {
               console.log("WOW: animating <" + box.tagName.toLowerCase() + ">")
            }
         }
      );
      wow.init();
   </script>
</body>

</html>
